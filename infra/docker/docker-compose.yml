services:
  postgres:
    image: postgres:16-alpine
    container_name: music-core-postgres
    environment:
      POSTGRES_USER: musiccore
      POSTGRES_PASSWORD: musiccore
      POSTGRES_DB: musiccore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musiccore -d musiccore"]
      interval: 10s
      timeout: 5s
      retries: 5

  init:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: music-core-init
    environment:
      DATABASE_URL: postgresql://musiccore:musiccore@postgres:5432/musiccore
      JWT_SECRET: replace-me
    command: sh -c "npm run -w @music-core/api migrate && npm run -w @music-core/api seed"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: music-core-api
    env_file:
      - ../../apps/api/.env.example
    environment:
      DATABASE_URL: postgresql://musiccore:musiccore@postgres:5432/musiccore
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
      - /app/node_modules
      - music_uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: music-core-web
    env_file:
      - ../../apps/web/.env.example
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ../../:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  music_uploads:
