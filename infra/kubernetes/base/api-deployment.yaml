apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: music-core-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom: {configMapKeyRef: {name: music-core-config, key: API_PORT}}
            - name: HOST
              valueFrom: {configMapKeyRef: {name: music-core-config, key: API_HOST}}
            - name: UPLOADS_ROOT
              valueFrom: {configMapKeyRef: {name: music-core-config, key: API_UPLOADS_ROOT}}
            - name: DATABASE_URL
              valueFrom: {secretKeyRef: {name: music-core-secrets, key: DATABASE_URL}}
            - name: JWT_SECRET
              valueFrom: {secretKeyRef: {name: music-core-secrets, key: JWT_SECRET}}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
